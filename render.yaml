services:
  - type: web
    name: startup-navigator-backend
    env: python
    buildCommand: "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
